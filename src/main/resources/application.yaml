spring:
  application:
    name: chatbot-api

  # Database configuration for PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/chatbot_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # JPA/Hibernate configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Security configuration (temporarily disabled for development)
  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin123}

# Discord Bot Configuration
discord:
  bot:
    token: ${DISCORD_BOT_TOKEN:your-discord-bot-token-here}
    enabled: ${DISCORD_BOT_ENABLED:false}

# OpenAI Configuration (for our custom properties)
openai:
  api:
    key: ${OPENAI_API_KEY:your-openai-api-key-here}
    model:
      chat: o4-mini
      embedding: text-embedding-3-small # For RAG implementation
    max-tokens: 500 # Token limit as per cost control requirements
    temperature: 0.7

# Application-specific settings
chatbot:
  rules:
    enabled: true
  rag:
    enabled: false # Will be enabled in iteration 3
  llm:
    fallback-enabled: true
    max-retries: 3
